<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .parent-container {
        position: relative;
        width: 400px;
        height: 200px;
        border: 3px dashed gray;
        background-color: azure;
        margin-top: 50px;
      }

      .normal-box {
        background-color: beige;
        padding: 10px;
        border: 1px solid black;
      }

      .absolute-box {
        position: absolute;
        bottom: 0;
        left: 0;

        background-color: orange;
        padding: 15px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="parent-container">
      <div class="normal-box">Normal box</div>
      <div class="absolute-box">Absolute box</div>
      <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Saepe officiis
        error rem culpa iusto nisi animi voluptate porro, molestias magni quidem
        commodi. Obcaecati nisi quisquam fugiat velit natus, aut ipsum.
      </p>
    </div>
  </body>
</html>
